# SwiftLint configuration for Neos
# Aligned with project conventions (CLAUDE.md)

included:
  - Neos
  - HEOSKit/Sources
  - NeosDomain/Sources

excluded:
  - Neos/Resources
  - "**/*.generated.swift"

# Disabled rules that conflict with project conventions
disabled_rules:
  - trailing_comma                          # Project uses trailing commas in multi-line arrays
  - opening_brace                           # Conflicts with some SwiftUI builder patterns
  - type_name                               # DS, ID enums are intentionally short
  - identifier_name                         # Short names like `v`, `p`, `ps` used in AppKit bridging code
  - large_tuple                             # Some HEOS protocol tuples are naturally large
  - nesting                                 # DS enum uses nested enums by design
  - todo                                    # TODOs are tracked externally
  - cyclomatic_complexity                   # Covered by cognitive_complexity opt-in
  - multiple_closures_with_trailing_closure # Standard SwiftUI pattern (.sheet, .alert, etc.)
  - optional_data_string_conversion        # String(decoding:as:) is the correct non-failable API

# Opt-in rules worth enabling
opt_in_rules:
  - closure_body_length
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - discouraged_assert
  - empty_collection_literal
  - empty_count
  - empty_string
  - empty_xctest_method
  - enum_case_associated_values_count
  - explicit_init
  - fallthrough
  - fatal_error_message
  - file_name_no_space
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - lower_acl_than_parent
  - modifier_order
  - overridden_super_call
  - prefer_self_in_static_references
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - private_action
  - private_outlet
  - reduce_into
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - unowned_variable_capture
  - yoda_condition

# Rule configurations
line_length:
  warning: 160
  error: 250
  ignores_urls: true
  ignores_comments: true
  ignores_function_declarations: true

file_length:
  warning: 500
  error: 800

type_body_length:
  warning: 400
  error: 700

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 8

# SwiftUI view builder closures are naturally longer than business logic closures.
# 50-line warning catches genuinely complex closures without flagging normal views.
closure_body_length:
  warning: 50
  error: 120

# HEOS protocol enum cases (playStation, addTrackToQueue) have 5 associated values;
# these map 1:1 to the HEOS CLI command parameters and can't be reduced.
enum_case_associated_values_count:
  warning: 6
  error: 8

force_unwrapping:
  severity: error

force_cast:
  severity: warning

trailing_whitespace:
  ignores_empty_lines: true
  ignores_comments: true

vertical_whitespace:
  max_empty_lines: 2
