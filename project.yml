name: Neos
options:
  bundleIdPrefix: com.galela
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  defaultConfig: Release

packages:
  HEOSKit:
    path: HEOSKit
  NeosDomain:
    path: NeosDomain

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  Neos:
    type: application
    platform: macOS
    sources:
      - path: Neos
        excludes:
          - Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galela.neos
        INFOPLIST_FILE: Neos/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        PRODUCT_NAME: Neos
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        GENERATE_INFOPLIST_FILE: false
        COMBINE_HIDPI_IMAGES: true
        ENABLE_HARDENED_RUNTIME: true
    dependencies:
      - package: HEOSKit
      - package: NeosDomain
    entitlements:
      path: Neos/Neos.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.network.server: true
        com.apple.security.files.user-selected.read-only: true

  NeosTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: NeosTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galela.neos.tests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Neos

  NeosUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: NeosUITests
      - path: Neos/Utilities/AccessibilityID.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.galela.neos.uitests
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: Neos

schemes:
  Neos:
    build:
      targets:
        Neos: all
        NeosTests: [test]
        NeosUITests: [test]
    test:
      targets:
        - NeosTests
        - NeosUITests
  NeosUITests:
    build:
      targets:
        Neos: all
        NeosUITests: [test]
    test:
      testPlans:
        - path: NeosIntegrationTests.xctestplan
          defaultPlan: true
        - path: NeosSmokeTests.xctestplan
