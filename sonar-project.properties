sonar.projectKey=gaelsimon_neos-audio
sonar.organization=gaelsimon
sonar.projectName=Neos
sonar.projectVersion=1.0.2

# Sources & tests
sonar.sources=Neos,HEOSKit/Sources,NeosDomain/Sources
sonar.tests=NeosTests,NeosUITests,HEOSKit/Tests,NeosDomain/Tests

# Exclusions
sonar.exclusions=**/*.generated.swift,**/Resources/**,**/Mocks/**,**/.build/**,**/build/**,docs/**,scripts/**
sonar.test.exclusions=**/Mocks/**

# Coverage report from xccov → sonar-generic format (produced by CI)
sonar.coverageReportPaths=sonar-coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
