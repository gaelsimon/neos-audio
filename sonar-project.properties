sonar.projectKey=gaelsimon_neos-audio
sonar.organization=gaelsimon
sonar.projectName=Neos
sonar.projectVersion=1.0.2

# Sources & tests
sonar.sources=Neos,HEOSKit/Sources,NeosDomain/Sources
sonar.tests=NeosTests,NeosUITests,HEOSKit/Tests,NeosDomain/Tests

# Exclusions
sonar.exclusions=**/*.generated.swift,**/Resources/**,**/Mocks/**,**/.build/**,**/build/**,docs/**,scripts/**
sonar.test.exclusions=**/Mocks/**

# Coverage (SonarQube generic report from scripts/sonar-coverage.sh, SPM packages only).
# Exclude the SwiftUI app target and the connection actors, which are covered by app/UI
# tests rather than the package suites that feed this report.
sonar.coverageReportPaths=coverage-sonar.xml
sonar.coverage.exclusions=Neos/**,**/HEOSService.swift,**/HEOSService+Lifecycle.swift

# Encoding
sonar.sourceEncoding=UTF-8
